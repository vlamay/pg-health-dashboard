version: '3.8'

services:
  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/app
    environment:
      RELOAD: "true"
    command: >
      sh -c "pip install pytest ruff psycopg2-binary &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev -- --host 0.0.0.0

  postgres:
    ports:
      - "5432:5432"
